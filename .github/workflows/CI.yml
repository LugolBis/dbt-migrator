name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: ./.github/actions/rust-test

  build-wheels:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: ./.github/actions/build-wheels
        with:
          os: ${{ matrix.os }}

  build-sdist:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: ./.github/actions/build-sdist